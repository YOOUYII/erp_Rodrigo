<div class="flex h-screen overflow-hidden">
    <nav>
        <p-menu [model]="items" class="flex justify-start w-full">
            <ng-template #start>
                <span class="inline-flex items-center gap-1 px-2 py-2">
                    <span class="text-xl font-semibold">ERP<span class="text-primary">Rodrigo</span></span>
                </span>
            </ng-template>
            <ng-template #submenuheader let-item>
                <span class="text-primary font-bold">{{ item.label }}</span>
            </ng-template>
            <ng-template #item let-item>
                <a pRipple class="flex items-center p-menu-item-link" [routerLink]="item.routerLink">
                    <span [class]="item.icon"></span>
                    <span class="ml-2">{{ item.label }}</span>
                </a>
            </ng-template>
            <ng-template #end>
                <span class="font-bold">V0.6</span>
            </ng-template>
        </p-menu>
    </nav>

    <div class="flex-1 flex flex-col h-full overflow-hidden bg-gray-50">
        <main class="flex-1 overflow-y-auto p-8">
            <router-outlet></router-outlet>
        </main>

        <!-- Footer -->
        <footer class="py-6 text-center shrink-0">
            <p class="text-sm">
                © 2026 ERP Rodrigo - Todos los derechos reservados
            </p>
        </footer>
    </div>
</div>
