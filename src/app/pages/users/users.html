<div class="card">
    <p-toast />
    <p-toolbar class="mb-6">
        <ng-template pTemplate="start">
            <p-button label="New" icon="pi pi-plus" class="mr-2" (onClick)="openNew()" />
            <p-button severity="danger" label="Delete" icon="pi pi-trash" outlined (onClick)="deleteSelectedUsers()" [disabled]="!selectedUsers || !selectedUsers.length" />
        </ng-template>

        <ng-template pTemplate="end">
            <!-- <p-fileUpload mode="basic" accept="image/*" [maxFileSize]="1000000" label="Import" chooseLabel="Import" auto customUpload class="mr-2 inline-block" [chooseButtonProps]="{ severity: 'secondary' }" /> -->
            <p-button label="Export" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV(dt)" />
        </ng-template>
    </p-toolbar>
    <p-table
        #dt
        [value]="users"
        [rows]="10"
        [columns]="cols"
        [paginator]="true"
        [globalFilterFields]="['name', 'country.name', 'representative.name', 'status']"
        [tableStyle]="{ 'min-width': '75rem' }"
        [(selection)]="selectedUsers"
        [rowHover]="true"
        dataKey="id"
        currentPageReportTemplate="Mostrando de {first} al {last} de {totalRecords} usuarios"
        [showCurrentPageReport]="true"
    >
        <ng-template #caption>
            <div class="flex items-center justify-between">
                <h5 class="m-0">Administrar Usuarios</h5>
                <p-iconfield>
                    <p-inputicon class="pi pi-search" />
                    <input pInputText type="text" (input)="dt.filterGlobal($event.target.value, 'contains')" placeholder="Search..." />
                </p-iconfield>
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th style="width: 3rem">
                    <p-tableHeaderCheckbox />
                </th>
                <th pSortableColumn="name" style="min-width: 16rem">
                    Nombre
                    <p-sortIcon field="name" />
                </th>
                <th style="min-width:16rem">
                    Correo
                </th>
                <th style="min-width: 8rem">
                    <div class="flex items-center gap-2">
                        Grupo
                    </div>
                </th>
                <th style="min-width:10rem text-center">
                    <div class="flex items-center gap-2">
                        Permisos
                    </div>
                </th>
                <th pSortableColumn="inventoryStatus" style="min-width: 12rem">
                    <div class="flex items-center gap-2 text-center">
                        Estado
                        <p-sortIcon field="inventoryStatus" />
                    </div>
                </th>
                <th style="min-width: 12rem">
                    <div class="flex items-center gap-2">
                        Acciones
                    </div>
                </th>
            </tr>
        </ng-template>
        <ng-template #body let-user>
            <tr>
                <td style="width: 3rem">
                    <p-tableCheckbox [value]="user" />
                </td>
                <td style="min-width: 12rem">{{ user.name }}</td>
                <td style="min-width: 16rem">{{ user.email }}</td>
                <td>{{ user.groups}}</td>
                <td>
                    <ul>
                        <li *ngFor="let permissionTag of user.permissionTags" class="m-1">
                            <p-tag [value]="permissionTag.label" [severity]="permissionTag.severity" />
                        </li>
                    </ul>
                </td>
                <td>
                    <ng-container *ngIf="getStatusTags(user.status) as statusInfo">
                        <p-tag [value]="statusInfo.label" [severity]="statusInfo.severity" />
                    </ng-container>
                </td>
                <td>
                    <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (click)="editUser(user)" />
                    <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (click)="deleteUser(user)" />
                </td>
            </tr>
        </ng-template>
    </p-table>
    <p-dialog [(visible)]="userDialog" [style]="{ width: '450px' }" header="Product Details" [modal]="true">
        <ng-template #content>
            <div class="flex flex-col gap-6">
                <div>
                    <label for="name" class="block font-bold mb-3">Nombre</label>
                    <input type="text" pInputText id="name" [(ngModel)]="user.name" required autofocus fluid />
                    <small class="text-red-500" *ngIf="submitted && !user.name">El nombre es obligatorio</small>
                </div>
                <div>
                    <label for="email" class="block font-bold mb-3">Correo</label>
                    <input type="text" pInputText id="emaill" [(ngModel)]="user.email" required autofocus fluid />
                </div>
                <!-- <div>
                    <label for="status" class="block font-bold mb-3">Grupo</label>
                    <p-select [(ngModel)]="user.status" inputId="status" [options]="statuses" optionLabel="label" optionValue="value" placeholder="Selecciona un Grupo(s)" fluid />
                </div> -->
                <div>
                    <label for="permissions" class="block font-bold mb-3">Permisos</label>
                    <p-multiselect [options]="possiblePermissions" [(ngModel)]="user.permissions" optionLabel="label" optionValue="value" placeholder="Selecciona los permisos" [maxSelectedLabels]="3" appendTo="body" fluid/>
                </div>
                <div>
                    <label for="status" class="block font-bold mb-3">Estado</label>
                    <p-select [(ngModel)]="user.status" inputId="status" [options]="statuses" optionLabel="label" optionValue="value" placeholder="Selecciona Estado" appendTo="body" fluid/>
                </div>
            </div>
        </ng-template>
        <ng-template #footer>
            <p-button label="Cancel" icon="pi pi-times" text (click)="hideDialog()" />
            <p-button label="Save" icon="pi pi-check" (click)="saveUser()" />
        </ng-template>
    </p-dialog>
    <p-confirmdialog [style]="{ width: '450px' }" />
</div>
