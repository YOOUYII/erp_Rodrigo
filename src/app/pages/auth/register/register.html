<section class="min-h-screen flex items-center justify-center bg-gray-50">

    <p-card class="w-full max-w-lg shadow-2xl rounded-2xl">

        <div class="text-center mb-6">
        <h2 class="text-2xl font-bold">Crear Cuenta</h2>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="register()" class="space-y-5">

        <!-- Name -->
        <span class="p-float-label">
            <label for="name">Nombre</label>
            <input pInputText formControlName="name" id="name" class="w-full" />
        </span>

        <p-message
            *ngIf="registerForm.controls.name.hasError('whiteSpace') && registerForm.controls.name.touched"
            severity="error"
            text="No puede estar en blanco">
        </p-message>

        <!-- User -->
        <span class="p-float-label">
            <label for="user">Usuario</label>
            <input pInputText formControlName="user" id="user" class="w-full" />
        </span>
        
        <p-message
            *ngIf="registerForm.controls.user.hasError('pattern') && registerForm.controls.user.touched"
            severity="error"
            text="Solo letras, números y guion bajo (4-20 caracteres)">
        </p-message>

        <!-- Email -->
        <span class="p-float-label">
            <label for="email">Correo</label>
            <input pInputText formControlName="email" id="email" class="w-full" />
        </span>

        <!-- Edad -->
        <span class="p-float-label">
            <label for="age">Edad</label>
            <input pInputText type="text" inputmode="numeric" formControlName="age" id="age" class="w-full" />
        </span>

        <p-message
            *ngIf="registerForm.controls.age.errors?.['min'] && registerForm.controls.age.touched"
            severity="error"
            text="Debes ser mayor de edad (18+)">
        </p-message>

        <p-message
            *ngIf="registerForm.controls.age.errors?.['pattern'] && registerForm.controls.age.touched"
            severity="error"
            text="Solo se permiten numeros enteros">
        </p-message>

        <!-- Phone -->
        <span class="p-float-label">
            <label for="phone">Teléfono</label>
            <input pInputText formControlName="phone" id="phone" class="w-full" maxlength="10" />
        </span>

        <p-message
            *ngIf="registerForm.controls.phone.errors?.['pattern'] && registerForm.controls.phone.touched"
            severity="error"
            text="Solo se permiten números">
        </p-message>

        <!-- Password -->
        <span class="p-float-label">
            <label for="password">Contraseña</label>
            <p-password
            formControlName="password"
            inputId="password"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full">
            </p-password>
        </span>

        <p-message
            *ngIf="registerForm.controls.password.invalid && registerForm.controls.password.touched"
            severity="error"
            text="Mínimo 10 caracteres y al menos 1 símbolo (!@#$%^&*)">
        </p-message>

        <span class="p-float-label">
            <label for="confirmPassword">Confirmar contraseña</label>
            <p-password
            formControlName="confirmPassword"
            inputId="confirmPassword"
            [feedback] = "false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full">
            </p-password>
        </span>

        <p-message
            *ngIf="registerForm.hasError('passwordMismatch') && registerForm.controls.confirmPassword.touched"
            severity="error"
            text="Debe de eser igual a la contraseña de arriba">
        </p-message>



        <p-button
            label="Registrarse"
            type="submit"
            severity="success"
            class="w-full"
            [disabled]="registerForm.invalid">
        </p-button>

        </form>

    </p-card>

</section>
