<!-- Navbar -->
<p-menubar [model]="menuItems" class="shadow-md">
    <ng-template pTemplate="start">
        <h3 class="m-0 font-semibold text-lg">{{ title }}</h3>
    </ng-template>
</p-menubar>

<section class="min-h-screen flex items-center justify-center bg-gray-100">

    <p-card class="w-full max-w-md shadow-2xl rounded-2xl">

        <div class="text-center mb-6">
        <h2 class="text-2xl font-bold">Iniciar Sesión</h2>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-5">

            <span class="p-float-label">
                <label for="email">Correo</label>
                <input pInputText formControlName="email" id="email" class="w-full" />
            </span>

            <span class="p-float-label">
                <label for="password">Contraseña</label>
                <p-password
                formControlName="password"
                inputId="password"
                [feedback]="false"
                [toggleMask]="true"
                styleClass="w-full"
                inputStyleClass="w-full">
                </p-password>
            </span>

            <p-message 
                *ngIf="errorMessage"
                severity="error"
                text="{{ errorMessage }}">
            </p-message>

            <p-button
                label="Ingresar"
                type="submit"
                severity="primary"
                class="w-full"
                [disabled]="loginForm.invalid">
            </p-button>

        </form>

        <!-- Link Registro -->
        <div class="text-center mt-4 text-sm text-gray-600">
            ¿No tienes cuenta?
            <a routerLink="/register" class="text-blue-600 hover:underline cursor-pointer">
            Regístrate aquí
            </a>
        </div>

    </p-card>

</section>
